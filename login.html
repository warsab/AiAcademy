<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — DixonAI Academy</title>
<style>
:root {
  --bg: hsl(20, 14.3%, 4.1%);
  --fg: hsl(60, 9.1%, 97.8%);
  --fg-muted: hsl(20, 5.9%, 65%);
  --fg-subtle: hsl(20, 5.9%, 55%);
  --card: hsl(20, 10%, 10%);
  --card-hover: hsl(20, 10%, 13%);
  --primary: hsl(60, 9.1%, 97.8%);
  --accent: #F07A2F;
  --accent-light: rgba(240, 122, 47, 0.08);
  --border: hsl(20, 5.9%, 18%);
  --border-hover: hsl(20, 5.9%, 25%);
  --input: hsl(20, 5.9%, 15%);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
  --radius: 0.5rem;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --transition: 0.2s ease;
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  height: 100%;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.6;
}

.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
  text-align: center;
}

.logo-img {
  width: 180px;
  height: 180px;
  object-fit: contain;
  filter: brightness(0) invert(1);
  margin-bottom: 0.75rem;
}

.brand-name {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--fg);
  margin-bottom: 0.25rem;
}

.brand-desc {
  font-size: 0.875rem;
  color: var(--fg-muted);
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1rem;
  text-align: left;
}

.form-group label {
  display: block;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--fg-muted);
  margin-bottom: 0.375rem;
}

.form-group input {
  width: 100%;
  padding: 0.625rem 0.75rem;
  font-size: 0.9375rem;
  font-family: var(--font);
  color: var(--fg);
  background: var(--input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--transition);
}

.form-group input::placeholder {
  color: var(--fg-subtle);
}

.form-group input:focus {
  border-color: var(--accent);
}

.login-btn {
  width: 100%;
  padding: 0.7rem;
  margin-top: 0.5rem;
  font-size: 1rem;
  font-weight: 600;
  font-family: var(--font);
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: opacity var(--transition);
}

.login-btn:hover {
  opacity: 0.9;
}
</style>
</head>
<body>

<div class="login-card">
  <img src="logo.png" alt="DixonAI Logo" class="logo-img">
  <div class="brand-name">DixonAI Academy</div>
  <p class="brand-desc">Sign in to continue</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter your username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" required>
    </div>
    <p id="errorMsg" style="color:var(--accent);font-size:0.8125rem;margin-bottom:0.5rem;display:none;"></p>
    <button type="submit" class="login-btn">Sign In</button>
  </form>
</div>

<script>
// Redirect to index if already logged in
if (sessionStorage.getItem('dixonai_auth')) {
  window.location.replace('index.html');
}

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const err = document.getElementById('errorMsg');
  if (username === 'admin' && password === 'admin123') {
    sessionStorage.setItem('dixonai_auth', username);
    window.location.replace('index.html');
  } else {
    err.textContent = 'Invalid username or password.';
    err.style.display = 'block';
  }
});
</script>
</body>
</html>
